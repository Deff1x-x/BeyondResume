services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_UPSTREAM: http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./data/uploads:/app/data/uploads

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ebh
      POSTGRES_USER: ebh
      POSTGRES_PASSWORD: ebh
    ports:
      - "5432:5432"
